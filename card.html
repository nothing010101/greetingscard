<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wishcraft</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Bebas+Neue&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100vh;overflow-x:hidden;}
body{font-family:'DM Sans',sans-serif;}

/* ════════════════════════════════════════
   INTRO OVERLAY — shared
════════════════════════════════════════ */
#intro{position:fixed;inset:0;z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.6s ease,transform 0.6s ease;}
#intro.hide{opacity:0;pointer-events:none;transform:scale(1.03);}
.intro-box{max-width:380px;width:90%;text-align:center;padding:2.5rem;}
.intro-emoji{font-size:3.5rem;margin-bottom:1.5rem;display:block;animation:floatPulse 2s ease-in-out infinite;}
@keyframes floatPulse{0%,100%{transform:scale(1) translateY(0);}50%{transform:scale(1.08) translateY(-6px);}}
.intro-msg{font-size:1.05rem;line-height:1.7;margin-bottom:2rem;}
.intro-btn{display:inline-block;padding:0.85rem 2.2rem;border-radius:100px;font-family:'Syne',sans-serif;font-size:0.85rem;font-weight:700;letter-spacing:0.05em;cursor:pointer;border:none;transition:all 0.2s;}
.intro-btn:hover{transform:translateY(-2px);}
.intro-sub{font-size:0.72rem;margin-top:1rem;opacity:0.5;}

/* step tracker */
.intro-steps{display:flex;gap:0.4rem;justify-content:center;margin-bottom:1.5rem;}
.ist{width:6px;height:6px;border-radius:50%;opacity:0.3;transition:opacity 0.3s;}
.ist.on{opacity:1;}

/* ════════════════════════════════════════
   CARD CONTAINER
════════════════════════════════════════ */
#card{opacity:0;transition:opacity 0.8s ease;min-height:100vh;}
#card.show{opacity:1;}

/* ════════════════════════════════════════
   THEME: SAYANG 🌸
   Soft cream + dusty rose, handwritten feel
════════════════════════════════════════ */
.sayang #intro{background:linear-gradient(135deg,#fff0f3 0%,#ffe4ea 50%,#ffd6df 100%);}
.sayang .intro-msg{color:#8b4a58;font-family:'Playfair Display',serif;font-style:italic;font-size:1.15rem;}
.sayang .intro-btn{background:linear-gradient(135deg,#e8527a,#c43d5c);color:white;box-shadow:0 6px 20px rgba(196,61,92,0.35);}
.sayang .ist{background:#e8527a;}
.sayang .intro-sub{color:#b07080;}
.sayang .intro-emoji{filter:drop-shadow(0 4px 12px rgba(232,82,122,0.3));}

.sayang #card{background:linear-gradient(160deg,#fff8f9 0%,#fff0f3 50%,#ffe8ed 100%);padding:0 0 4rem;}

.sy-hero{min-height:55vw;max-height:420px;position:relative;overflow:hidden;display:flex;align-items:flex-end;}
.sy-hero-bg{position:absolute;inset:0;background:linear-gradient(135deg,#f7c5d0,#ebb8c8,#d4869a);}
.sy-hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(255,240,243,1) 0%,transparent 60%);}
.sy-hero-txt{position:relative;z-index:1;padding:2rem 2rem 1.5rem;}
.sy-occ{font-size:0.62rem;font-family:'Syne',sans-serif;letter-spacing:0.3em;text-transform:uppercase;color:rgba(139,74,88,0.6);margin-bottom:0.5rem;}
.sy-name{font-family:'Playfair Display',serif;font-size:clamp(2.8rem,10vw,5rem);font-weight:700;font-style:italic;color:#4a1525;line-height:1.05;}

.sy-body{padding:2rem 2rem 0;max-width:600px;margin:0 auto;}

/* Polaroid slideshow */
.sy-slideshow{position:relative;margin-bottom:2rem;}
.sy-slide{display:none;animation:fadeSlide 0.5s ease;}
.sy-slide.active{display:block;}
@keyframes fadeSlide{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.sy-polaroid{background:white;padding:0.8rem 0.8rem 2rem;box-shadow:0 8px 30px rgba(0,0,0,0.12),0 2px 8px rgba(0,0,0,0.06);max-width:320px;margin:0 auto;transform:rotate(-1deg);}
.sy-polaroid.even{transform:rotate(1.5deg);}
.sy-polaroid img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;}
.sy-pol-nav{display:flex;justify-content:center;gap:0.5rem;margin-top:1rem;}
.sy-pol-dot{width:7px;height:7px;border-radius:50%;background:rgba(196,61,92,0.2);border:none;cursor:pointer;transition:background 0.2s;padding:0;}
.sy-pol-dot.on{background:#c43d5c;}

.sy-msg{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:400;color:#3a1a22;line-height:1.9;margin-bottom:2rem;}
.sy-sig{display:flex;align-items:center;gap:0.75rem;padding-top:1.5rem;border-top:1px dashed rgba(196,61,92,0.2);margin-bottom:2rem;}
.sy-heart{font-size:1.3rem;animation:hb 1.1s ease-in-out infinite;}
@keyframes hb{0%,100%{transform:scale(1);}50%{transform:scale(1.3);}}
.sy-sig-from{font-size:0.72rem;color:#b07080;font-family:'Syne',sans-serif;letter-spacing:0.1em;text-transform:uppercase;}
.sy-sig-name{font-family:'Playfair Display',serif;font-style:italic;font-size:1.1rem;color:#c43d5c;}

/* Reaction buttons */
.sy-reactions{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1.5rem;}
.sy-react{background:rgba(196,61,92,0.06);border:1.5px solid rgba(196,61,92,0.15);border-radius:100px;padding:0.5rem 1rem;font-size:0.85rem;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:0.4rem;color:#8b4a58;}
.sy-react:hover{background:rgba(196,61,92,0.12);transform:scale(1.05);}
.sy-react span{font-size:0.7rem;font-family:'Syne',sans-serif;font-weight:600;}

/* ════════════════════════════════════════
   THEME: BESTIE 🎉
   Neon yellow + black maximalist
════════════════════════════════════════ */
.bestie #intro{background:#0e0e0e;}
.bestie .intro-msg{color:#e8ff47;font-family:'Syne',sans-serif;font-weight:700;font-size:1.3rem;letter-spacing:-0.01em;}
.bestie .intro-btn{background:#e8ff47;color:#0e0e0e;font-size:0.9rem;}
.bestie .ist{background:#e8ff47;}
.bestie .intro-sub{color:#555;}
.bestie .intro-emoji{animation:spin-wobble 1.5s ease-in-out infinite;}
@keyframes spin-wobble{0%,100%{transform:rotate(-5deg) scale(1);}50%{transform:rotate(5deg) scale(1.1);}}

.bestie #card{background:#0e0e0e;color:#f0f0f0;padding:0 0 4rem;}

.bt-ticker{background:#e8ff47;padding:0.55rem 0;overflow:hidden;white-space:nowrap;}
.bt-ticker-inner{display:inline-block;animation:ticker 12s linear infinite;}
@keyframes ticker{from{transform:translateX(0);}to{transform:translateX(-50%);}}
.bt-ticker-txt{font-family:'Syne',sans-serif;font-weight:800;font-size:0.75rem;letter-spacing:0.15em;text-transform:uppercase;color:#0e0e0e;padding:0 2rem;}

.bt-hero{padding:3rem 2rem 2rem;border-bottom:1px solid rgba(255,255,255,0.08);}
.bt-occ{font-size:0.62rem;font-family:'Syne',sans-serif;letter-spacing:0.3em;text-transform:uppercase;color:#555;margin-bottom:0.5rem;}
.bt-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(4rem,18vw,9rem);line-height:0.9;letter-spacing:0.02em;color:#f0f0f0;margin-bottom:0.5rem;}
.bt-name .acc{color:#e8ff47;}

.bt-body{padding:2rem;max-width:680px;margin:0 auto;}

/* Big photo grid */
.bt-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:0.5rem;margin-bottom:2rem;}
.bt-grid .gf{aspect-ratio:1;overflow:hidden;}
.bt-grid .gf img{width:100%;height:100%;object-fit:cover;transition:transform 0.4s;}
.bt-grid .gf:first-child{grid-column:span 2;aspect-ratio:16/7;}
.bt-grid .gf img:hover{transform:scale(1.04);}

.bt-msg-wrap{border:1px solid rgba(255,255,255,0.08);padding:1.5rem;border-radius:2px;margin-bottom:1.5rem;position:relative;}
.bt-msg-wrap::before{content:'"';position:absolute;top:-1rem;left:1rem;font-family:'Syne',sans-serif;font-size:4rem;color:rgba(232,255,71,0.15);line-height:1;}
.bt-msg{font-size:1.05rem;color:rgba(240,240,240,0.85);line-height:1.8;position:relative;z-index:1;}

.bt-sig{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 0;border-top:1px solid rgba(255,255,255,0.08);border-bottom:1px solid rgba(255,255,255,0.08);margin-bottom:1.5rem;}
.bt-sig-name{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;color:#e8ff47;}
.bt-sig-occ{font-size:0.7rem;color:#555;letter-spacing:0.15em;text-transform:uppercase;}

/* Reaction w/ flying emojis */
.bt-reactions{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1.5rem;}
.bt-react{background:rgba(232,255,71,0.06);border:1.5px solid rgba(232,255,71,0.15);border-radius:4px;padding:0.55rem 1.1rem;font-size:1rem;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:0.4rem;color:#e8ff47;}
.bt-react:hover{background:rgba(232,255,71,0.12);}
.bt-react:active{transform:scale(0.94);}
.bt-react span{font-size:0.72rem;font-family:'Syne',sans-serif;font-weight:700;}

/* Flying emoji overlay */
.fly-container{position:fixed;inset:0;pointer-events:none;z-index:900;overflow:hidden;}
.fly-emoji{position:absolute;font-size:1.8rem;animation:flyUp 1.2s cubic-bezier(0.2,0.8,0.4,1) forwards;pointer-events:none;}
@keyframes flyUp{0%{transform:translateY(0) scale(0.5);opacity:1;}100%{transform:translateY(-200px) scale(1.2);opacity:0;}}

/* ════════════════════════════════════════
   THEME: GALAU PRODUKTIF 🌙
   Dark sage + off-white, editorial
════════════════════════════════════════ */
.galau #intro{background:#0f1410;}
.galau .intro-box{border:1px solid rgba(140,180,120,0.15);background:rgba(15,20,16,0.95);}
.galau .intro-msg{color:rgba(220,235,215,0.85);font-family:'Crimson Pro',serif;font-size:1.1rem;font-style:italic;}
.galau .intro-btn{background:transparent;border:1.5px solid rgba(140,180,120,0.4);color:rgba(140,180,120,0.9);border-radius:4px;}
.galau .intro-btn:hover{background:rgba(140,180,120,0.1);}
.galau .ist{background:rgba(140,180,120,0.6);}
.galau .intro-sub{color:rgba(140,180,120,0.4);}

.galau #card{background:#0f1410;color:rgba(220,235,215,0.85);padding:0 0 4rem;}

.ga-loadbar{height:2px;background:rgba(140,180,120,0.1);position:relative;overflow:hidden;}
.ga-loadbar::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:rgba(140,180,120,0.6);animation:loadProg 1.5s ease forwards 0.2s;}
@keyframes loadProg{to{left:0;}}

.ga-header{padding:3rem 2rem 2rem;max-width:640px;margin:0 auto;border-bottom:1px solid rgba(140,180,120,0.1);}
.ga-meta{font-size:0.6rem;font-family:'Syne',sans-serif;letter-spacing:0.3em;text-transform:uppercase;color:rgba(140,180,120,0.4);margin-bottom:1rem;}
.ga-name{font-family:'Crimson Pro',serif;font-size:clamp(3rem,9vw,5rem);font-weight:300;font-style:italic;color:rgba(220,235,215,0.95);line-height:1.05;margin-bottom:0.3rem;}
.ga-occ{font-size:0.78rem;color:rgba(140,180,120,0.6);font-family:'Syne',sans-serif;letter-spacing:0.1em;}

.ga-body{padding:2rem;max-width:640px;margin:0 auto;}

/* Film strip horizontal scroll */
.ga-filmstrip{overflow-x:auto;margin-bottom:2rem;-webkit-overflow-scrolling:touch;}
.ga-filmstrip::-webkit-scrollbar{height:3px;}
.ga-filmstrip::-webkit-scrollbar-track{background:rgba(255,255,255,0.04);}
.ga-filmstrip::-webkit-scrollbar-thumb{background:rgba(140,180,120,0.3);}
.ga-film-inner{display:flex;gap:0.5rem;padding:0.5rem 0 1rem;width:max-content;}
.ga-frame{flex-shrink:0;width:200px;height:150px;position:relative;overflow:hidden;}
.ga-frame::before,.ga-frame::after{content:'';position:absolute;left:0;right:0;height:12px;background:repeating-linear-gradient(90deg,#0f1410 0px,#0f1410 8px,rgba(140,180,120,0.15) 8px,rgba(140,180,120,0.15) 14px);z-index:1;}
.ga-frame::before{top:0;}
.ga-frame::after{bottom:0;}
.ga-frame img{width:100%;height:100%;object-fit:cover;filter:saturate(0.5) contrast(1.1);}

.ga-msg{font-family:'Crimson Pro',serif;font-size:1.15rem;font-weight:300;color:rgba(220,235,215,0.8);line-height:2;margin-bottom:2rem;padding:1.5rem;background:rgba(140,180,120,0.03);border-left:2px solid rgba(140,180,120,0.2);}

.ga-sig{display:flex;align-items:center;gap:1rem;padding:1.2rem 0;border-top:1px solid rgba(140,180,120,0.1);}
.ga-sig-line{width:30px;height:1px;background:rgba(140,180,120,0.3);}
.ga-sig-from{font-size:0.6rem;font-family:'Syne',sans-serif;letter-spacing:0.25em;color:rgba(140,180,120,0.45);text-transform:uppercase;}
.ga-sig-name{font-family:'Crimson Pro',serif;font-style:italic;font-size:1.05rem;color:rgba(140,180,120,0.8);}

.ga-reactions{display:flex;gap:0.5rem;flex-wrap:wrap;margin:1.5rem 0;}
.ga-react{background:transparent;border:1px solid rgba(140,180,120,0.15);border-radius:3px;padding:0.5rem 1rem;font-size:0.85rem;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:0.4rem;color:rgba(140,180,120,0.6);}
.ga-react:hover{background:rgba(140,180,120,0.06);border-color:rgba(140,180,120,0.3);}
.ga-react span{font-size:0.68rem;font-family:'Syne',sans-serif;letter-spacing:0.1em;}

/* ════════════════════════════════════════
   THEME: MAIN CHARACTER ✨
   Cinematic black + violet, letterbox
════════════════════════════════════════ */
.main #intro{background:#070710;}
.main .intro-msg{color:rgba(220,210,255,0.9);font-family:'Instrument Serif',serif;font-style:italic;font-size:1.1rem;letter-spacing:0.02em;}
.main .intro-btn{background:linear-gradient(135deg,#7c5cbf,#5a3d9a);color:white;box-shadow:0 6px 24px rgba(92,60,180,0.4);}
.main .ist{background:rgba(180,150,255,0.6);}
.main .intro-sub{color:rgba(180,150,255,0.35);}

.main #card{background:#070710;color:rgba(220,210,255,0.88);padding:0 0 4rem;}

/* Letterbox bars */
.mc-bars-top,.mc-bars-bot{height:clamp(30px,5vw,60px);background:#000;position:sticky;z-index:50;}
.mc-bars-top{top:0;}
.mc-bars-bot{bottom:0;position:fixed;left:0;right:0;}

.mc-scene{min-height:60vw;max-height:500px;position:relative;overflow:hidden;display:flex;align-items:flex-end;}
.mc-scene-bg{position:absolute;inset:0;background:linear-gradient(135deg,#1a1030,#0e0820,#150e2a);}
.mc-scene-overlay{position:absolute;inset:0;background:linear-gradient(to top,#070710 0%,transparent 55%);}
.mc-scene-photo{position:absolute;inset:0;object-fit:cover;width:100%;height:100%;filter:saturate(0.4) brightness(0.5);}
.mc-scene-txt{position:relative;z-index:1;padding:2rem;}
.mc-occ{font-size:0.58rem;font-family:'Syne',sans-serif;letter-spacing:0.4em;text-transform:uppercase;color:rgba(180,150,255,0.5);margin-bottom:0.5rem;}
.mc-name{font-family:'Instrument Serif',serif;font-size:clamp(3rem,10vw,6rem);font-style:italic;color:rgba(240,230,255,0.95);line-height:1.0;text-shadow:0 0 80px rgba(150,100,255,0.3);}

.mc-body{padding:2rem;max-width:660px;margin:0 auto;}

/* Subtitle typewriter */
.mc-subtitle{font-family:'Syne',sans-serif;font-size:0.7rem;letter-spacing:0.3em;text-transform:uppercase;color:rgba(180,150,255,0.45);margin-bottom:1.5rem;border-left:2px solid rgba(180,150,255,0.25);padding-left:1rem;}

/* Photo slideshow cinematic */
.mc-slideshow{position:relative;margin-bottom:2rem;aspect-ratio:16/9;overflow:hidden;background:#000;}
.mc-slide{position:absolute;inset:0;opacity:0;transition:opacity 0.8s ease;}
.mc-slide.active{opacity:1;}
.mc-slide img{width:100%;height:100%;object-fit:cover;filter:saturate(0.6) contrast(1.1);}
.mc-slide-nav{position:absolute;bottom:1rem;left:50%;transform:translateX(-50%);display:flex;gap:0.5rem;z-index:2;}
.mc-snav-dot{width:20px;height:2px;background:rgba(255,255,255,0.3);border:none;cursor:pointer;transition:all 0.2s;padding:0;}
.mc-snav-dot.on{background:rgba(180,150,255,0.9);width:32px;}
.mc-slide-label{position:absolute;bottom:0;left:0;right:0;padding:0.5rem 1rem;background:linear-gradient(to top,rgba(0,0,0,0.7),transparent);font-family:'Syne',sans-serif;font-size:0.6rem;letter-spacing:0.2em;color:rgba(255,255,255,0.5);z-index:2;}

.mc-msg{font-family:'Instrument Serif',serif;font-size:1.15rem;font-weight:400;color:rgba(220,210,255,0.82);line-height:1.95;margin-bottom:2rem;}

.mc-sig{display:flex;align-items:center;gap:1rem;padding:1.5rem 0;border-top:1px solid rgba(180,150,255,0.1);}
.mc-sig-line{width:32px;height:1px;background:rgba(180,150,255,0.3);}
.mc-sig-from{font-size:0.58rem;font-family:'Syne',sans-serif;letter-spacing:0.28em;color:rgba(180,150,255,0.4);text-transform:uppercase;}
.mc-sig-name{font-family:'Instrument Serif',serif;font-style:italic;font-size:1.1rem;color:rgba(180,150,255,0.85);}

.mc-reactions{display:flex;gap:0.5rem;flex-wrap:wrap;margin:1.5rem 0;}
.mc-react{background:transparent;border:1px solid rgba(180,150,255,0.15);border-radius:3px;padding:0.5rem 1rem;font-size:0.9rem;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:0.4rem;color:rgba(180,150,255,0.6);}
.mc-react:hover{background:rgba(180,150,255,0.07);border-color:rgba(180,150,255,0.35);}
.mc-react span{font-size:0.68rem;font-family:'Syne',sans-serif;}

/* ════════════════════════════════════════
   MEDIA PLAYER — shared
════════════════════════════════════════ */
.media-section{margin-top:1.5rem;}
.media-label{font-size:0.6rem;font-family:'Syne',sans-serif;letter-spacing:0.25em;text-transform:uppercase;opacity:0.45;margin-bottom:0.8rem;}
.yt-embed{width:100%;aspect-ratio:16/9;border:none;}
.audio-player{display:flex;align-items:center;gap:1rem;padding:1rem;border-radius:10px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);}
.ap-btn{width:44px;height:44px;border-radius:50%;border:1.5px solid currentColor;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all 0.2s;flex-shrink:0;}
.ap-btn:hover{background:rgba(255,255,255,0.06);}
.ap-info{flex:1;min-width:0;}
.ap-title{font-size:0.8rem;opacity:0.75;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:0.3rem;}
.ap-bar{height:3px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;}
.ap-prog{height:100%;width:0%;background:currentColor;transition:width 0.5s linear;border-radius:2px;}
.yt-hidden{display:none;}

/* Spotify */
.sp-embed{width:100%;height:80px;border:none;border-radius:8px;}

/* ════════════════════════════════════════
   FOOTER
════════════════════════════════════════ */
.wf-footer{text-align:center;padding:2rem;opacity:0.25;}
.wf-footer a{font-size:0.62rem;font-family:'Syne',sans-serif;letter-spacing:0.2em;text-transform:uppercase;text-decoration:none;color:inherit;}

/* ════════════════════════════════════════
   REACTION COUNT ANIMATION
════════════════════════════════════════ */
.fly-wrap{position:fixed;inset:0;pointer-events:none;z-index:900;overflow:hidden;}
.fly{position:absolute;font-size:2rem;animation:flyup 1.4s cubic-bezier(0.2,0.8,0.3,1) forwards;pointer-events:none;}
@keyframes flyup{0%{transform:translateY(0) scale(0.4) rotate(-10deg);opacity:1;}100%{transform:translateY(-300px) scale(1.1) rotate(10deg);opacity:0;}}

/* ════════════════════════════════════════
   UTILITIES
════════════════════════════════════════ */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.fade-in{animation:fadeUp 0.7s ease forwards;}
.wf-footer{animation:fadeUp 0.5s ease 2s both;}
</style>
</head>
<body>
<!-- Intro overlay -->
<div id="intro">
  <div class="intro-box">
    <div class="intro-steps" id="introSteps"></div>
    <span class="intro-emoji" id="introEmoji"></span>
    <div class="intro-msg" id="introMsg"></div>
    <button class="intro-btn" id="introBtn" onclick="nextStep()"></button>
    <div class="intro-sub" id="introSub"></div>
  </div>
</div>

<!-- Main card -->
<div id="card"></div>

<!-- Flying emoji container -->
<div class="fly-wrap" id="flyWrap"></div>

<!-- Hidden YT player -->
<div id="ytHidden" class="yt-hidden"></div>

<script>
// ── Parse data ────────────────────────────────────────────────────────────────
let DATA = null;
try {
  const r = new URLSearchParams(location.search).get('d');
  if (r) DATA = JSON.parse(decodeURIComponent(escape(atob(r))));
} catch(e){}

if (!DATA) {
  document.getElementById('intro').style.display = 'none';
  document.getElementById('card').innerHTML = `<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;font-family:'Syne',sans-serif;background:#0e0e0e;color:#f0f0f0"><div style="font-size:4rem;margin-bottom:1rem">🔗</div><h2 style="font-size:1.4rem;margin-bottom:0.5rem">Link tidak valid</h2><p style="color:#555;font-size:0.85rem;margin-bottom:2rem">Link ini mungkin sudah kadaluarsa atau salah.</p><a href="index.html" style="color:#e8ff47;font-size:0.8rem;letter-spacing:0.15em;text-transform:uppercase;text-decoration:none">Buat Ucapan Baru →</a></div>`;
  document.getElementById('card').classList.add('show');
}

const THEME = DATA?.theme || 'sayang';
document.body.className = THEME;

// ── Occasion labels ───────────────────────────────────────────────────────────
const OCC = {birthday:'Selamat Ulang Tahun',anniversary:'Selamat Anniversari',graduation:'Selamat Wisuda',wedding:'Selamat Menikah',newborn:'Selamat atas Kelahiran si Kecil',newyear:'Selamat Tahun Baru',miss:'Ada yang Kangen Kamu',sorry:'Minta Maaf',custom:'Ada Pesan Buat Kamu'};
const OCCE = {birthday:'🎂',anniversary:'💍',graduation:'🎓',wedding:'💒',newborn:'👶',newyear:'🎊',miss:'💌',sorry:'🙏',custom:'✨'};

function esc(s){ return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''; }
function nl(s){ return esc(s).replace(/\n/g,'<br>'); }

// ── INTRO SEQUENCES per theme ─────────────────────────────────────────────────
const STEPS = {
  sayang: [
    { emoji:'💌', msg:`Psst... ada seseorang yang mau bilang sesuatu buat <strong>${esc(DATA?.to||'kamu')}</strong>`, btn:'Buka Pesannya', sub:'dari '+esc(DATA?.from||'seseorang') },
    { emoji:'🌸', msg:`Siap-siap ya... ini mungkin bikin kamu baper`, btn:'Lanjut →', sub:'' },
    { emoji:'💕', msg:`Oke, ini dia...`, btn:'Buka Sekarang 💗', sub:'' }
  ],
  bestie: [
    { emoji:'🎉', msg:`YO ${esc(DATA?.to||'KAMU').toUpperCase()}!!!`, btn:'APA APAAN NIH', sub:'dari '+esc(DATA?.from||'seseorang') },
    { emoji:'🔥', msg:`SIAP BELUM SIAP BELUM???`, btn:'SIAPPP!!!', sub:'' },
    { emoji:'🚀', msg:`3... 2... 1...`, btn:'GASPOL 🔥', sub:'' }
  ],
  galau: [
    { emoji:'🌙', msg:`Hey ${esc(DATA?.to||'kamu')}. Ada sesuatu yang sudah lama ingin disampaikan.`, btn:'Lanjutkan', sub:'dari '+esc(DATA?.from||'seseorang') },
    { emoji:'📂', msg:`Membuka kenangan...`, btn:'Buka', sub:'' },
    { emoji:'🫂', msg:`Ini untukmu.`, btn:'Lihat →', sub:'' }
  ],
  main: [
    { emoji:'🎬', msg:`Sebuah pesan untuk ${esc(DATA?.to||'kamu')}.`, btn:'Mulai', sub:'dari '+esc(DATA?.from||'seseorang') },
    { emoji:'⭐', msg:`Dalam hidup ini, ada momen yang tidak bisa dilupakan begitu saja.`, btn:'Lanjut', sub:'' },
    { emoji:'✨', msg:`Ini adalah salah satunya.`, btn:'Buka Sekarang', sub:'' }
  ]
};

let stepIdx = 0;
const steps = DATA ? STEPS[THEME] : [];
const stepsEl = document.getElementById('introSteps');
const emojiEl = document.getElementById('introEmoji');
const msgEl   = document.getElementById('introMsg');
const btnEl   = document.getElementById('introBtn');
const subEl   = document.getElementById('introSub');

if (DATA) {
  // render dots
  stepsEl.innerHTML = steps.map((_,i)=>`<div class="ist${i===0?' on':''}" id="is${i}"></div>`).join('');
  renderStep(0);
}

function renderStep(i) {
  const s = steps[i];
  emojiEl.textContent = s.emoji;
  msgEl.innerHTML = s.msg;
  btnEl.textContent = s.btn;
  subEl.textContent = s.sub;
  document.querySelectorAll('.ist').forEach((d,j)=>d.classList.toggle('on',j<=i));
}

function nextStep() {
  stepIdx++;
  if (stepIdx >= steps.length) {
    showCard();
  } else {
    renderStep(stepIdx);
  }
}

function showCard() {
  document.getElementById('intro').classList.add('hide');
  buildCard();
  setTimeout(()=>{ document.getElementById('card').classList.add('show'); }, 300);
}

// ── BUILD CARD ────────────────────────────────────────────────────────────────
function buildCard() {
  if (!DATA) return;
  const { from, to, msg, theme, occasion, photos, yt, ytMode } = DATA;
  const occ = OCC[occasion]||OCC.custom;
  const occe = OCCE[occasion]||OCCE.custom;

  if (theme === 'sayang') buildSayang(from,to,msg,occ,occe,photos,yt,ytMode);
  else if (theme === 'bestie') buildBestie(from,to,msg,occ,occe,photos,yt,ytMode);
  else if (theme === 'galau') buildGalau(from,to,msg,occ,occe,photos,yt,ytMode);
  else buildMain(from,to,msg,occ,occe,photos,yt,ytMode);
}

// ── SAYANG ────────────────────────────────────────────────────────────────────
function buildSayang(from,to,msg,occ,occe,photos,yt,ytMode) {
  const photosHtml = photos?.length ? slideshowSayang(photos) : '';
  const mediaHtml  = buildMedia(yt, ytMode, '#c43d5c');

  document.getElementById('card').innerHTML = `
    <div class="sy-hero">
      <div class="sy-hero-bg"></div>
      <div class="sy-hero-overlay"></div>
      <div class="sy-hero-txt">
        <div class="sy-occ">${occe} ${esc(occ)}</div>
        <div class="sy-name">${esc(to)}</div>
      </div>
    </div>
    <div class="sy-body fade-in">
      ${photosHtml}
      <div class="sy-msg">${nl(msg)}</div>
      <div class="sy-sig">
        <span class="sy-heart">💕</span>
        <div>
          <div class="sy-sig-from">Dengan sayang,</div>
          <div class="sy-sig-name">${esc(from)}</div>
        </div>
      </div>
      <div class="sy-reactions">
        ${reactionBtns('sy-react',['🥺','💗','😭','🤗','❤️‍🔥'])}
      </div>
      ${mediaHtml}
    </div>
    <div class="wf-footer"><a href="index.html">Buat ucapanmu di Wishcraft</a></div>`;

  if (photos?.length) initSlideshowSayang(photos.length);
  initReactions('.sy-react');
  if (yt && ytMode==='audio') initYT(yt);
}

function slideshowSayang(photos) {
  const slides = photos.map((p,i)=>`
    <div class="sy-slide${i===0?' active':''}">
      <div class="sy-polaroid${i%2===1?' even':''}">
        <img src="${esc(p)}" alt="" loading="lazy">
      </div>
    </div>`).join('');
  const dots = photos.map((_,i)=>`<button class="sy-pol-dot${i===0?' on':''}" onclick="goSlideSayang(${i})"></button>`).join('');
  return `<div class="sy-slideshow" id="sySS">${slides}<div class="sy-pol-nav">${dots}</div></div>`;
}

let sySlideCur = 0, sySSlideTotal = 0;
function initSlideshowSayang(n) {
  sySSlideTotal = n;
  if (n > 1) setInterval(()=>goSlideSayang((sySlideCur+1)%n), 4000);
}
window.goSlideSayang = function(i) {
  const slides = document.querySelectorAll('.sy-slide');
  const dots   = document.querySelectorAll('.sy-pol-dot');
  slides.forEach((s,j)=>s.classList.toggle('active',j===i));
  dots.forEach((d,j)=>d.classList.toggle('on',j===i));
  sySlideCur = i;
};

// ── BESTIE ────────────────────────────────────────────────────────────────────
function buildBestie(from,to,msg,occ,occe,photos,yt,ytMode) {
  const gridHtml   = photos?.length ? gridBestie(photos) : '';
  const mediaHtml  = buildMedia(yt, ytMode, '#e8ff47');

  const tickerTxt  = `${esc(to)} ${occe} ${esc(occ)} · dari ${esc(from)} · `.repeat(8);

  document.getElementById('card').innerHTML = `
    <div class="bt-ticker"><div class="bt-ticker-inner"><span class="bt-ticker-txt">${tickerTxt}</span><span class="bt-ticker-txt">${tickerTxt}</span></div></div>
    <div class="bt-hero fade-in">
      <div class="bt-occ">${occe} ${esc(occ)}</div>
      <div class="bt-name">${esc(to).split('').map((c,i)=>i%3===1?`<span class="acc">${c}</span>`:c).join('')}</div>
    </div>
    <div class="bt-body fade-in">
      ${gridHtml}
      <div class="bt-msg-wrap"><div class="bt-msg">${nl(msg)}</div></div>
      <div class="bt-sig">
        <div><div class="bt-sig-from" style="font-size:0.6rem;color:#555;font-family:'Syne',sans-serif;letter-spacing:0.2em;text-transform:uppercase;">dari</div><div class="bt-sig-name">${esc(from)}</div></div>
        <div style="font-size:2.5rem;">${occe}</div>
      </div>
      <div class="bt-reactions">${reactionBtns('bt-react',['🔥','😭','🎉','💀','❤️'])}</div>
      ${mediaHtml}
    </div>
    <div class="wf-footer"><a href="index.html">Buat ucapanmu di Wishcraft</a></div>`;

  initReactions('.bt-react');
  if (yt && ytMode==='audio') initYT(yt);
}

function gridBestie(photos) {
  return `<div class="bt-grid">${photos.slice(0,5).map(p=>`<div class="gf"><img src="${esc(p)}" alt="" loading="lazy"></div>`).join('')}</div>`;
}

// ── GALAU ─────────────────────────────────────────────────────────────────────
function buildGalau(from,to,msg,occ,occe,photos,yt,ytMode) {
  const filmHtml   = photos?.length ? filmstripGalau(photos) : '';
  const mediaHtml  = buildMedia(yt, ytMode, 'rgba(140,180,120,0.7)');

  document.getElementById('card').innerHTML = `
    <div class="ga-loadbar"></div>
    <div class="ga-header fade-in">
      <div class="ga-meta">${occe} ${esc(occ)} · dari ${esc(from)}</div>
      <div class="ga-name">${esc(to)},</div>
      <div class="ga-occ">${esc(new Date().toLocaleDateString('id-ID',{year:'numeric',month:'long',day:'numeric'}))}</div>
    </div>
    <div class="ga-body fade-in">
      ${filmHtml}
      <div class="ga-msg">${nl(msg)}</div>
      <div class="ga-sig">
        <div class="ga-sig-line"></div>
        <div><div class="ga-sig-from">ditulis oleh</div><div class="ga-sig-name">${esc(from)}</div></div>
      </div>
      <div class="ga-reactions">${reactionBtns('ga-react',['🫂','😔','💚','🌙','✨'])}</div>
      ${mediaHtml}
    </div>
    <div class="wf-footer"><a href="index.html">Buat ucapanmu di Wishcraft</a></div>`;

  initReactions('.ga-react');
  if (yt && ytMode==='audio') initYT(yt);
}

function filmstripGalau(photos) {
  return `<div class="ga-filmstrip"><div class="ga-film-inner">${photos.map(p=>`<div class="ga-frame"><img src="${esc(p)}" alt="" loading="lazy"></div>`).join('')}</div></div>`;
}

// ── MAIN CHARACTER ────────────────────────────────────────────────────────────
function buildMain(from,to,msg,occ,occe,photos,yt,ytMode) {
  const ssHtml   = photos?.length ? slideshowMain(photos) : (photos?.length===0?'':'');
  const mediaHtml = buildMedia(yt, ytMode, 'rgba(180,150,255,0.8)');
  const firstPhoto = photos?.[0];

  document.getElementById('card').innerHTML = `
    <div class="mc-bars-top"></div>
    <div class="mc-scene">
      <div class="mc-scene-bg"></div>
      ${firstPhoto?`<img class="mc-scene-photo" src="${esc(firstPhoto)}" alt="">`:'' }
      <div class="mc-scene-overlay"></div>
      <div class="mc-scene-txt">
        <div class="mc-occ">${occe} ${esc(occ)}</div>
        <div class="mc-name">${esc(to)}</div>
      </div>
    </div>
    <div class="mc-body fade-in">
      <div class="mc-subtitle">Sebuah pesan dari ${esc(from)} · ${esc(new Date().getFullYear().toString())}</div>
      ${photos?.length>1 ? slideshowMain(photos) : ''}
      <div class="mc-msg">${nl(msg)}</div>
      <div class="mc-sig">
        <div class="mc-sig-line"></div>
        <div><div class="mc-sig-from">ditulis oleh</div><div class="mc-sig-name">${esc(from)}</div></div>
      </div>
      <div class="mc-reactions">${reactionBtns('mc-react',['✨','💜','😮','🎬','🫶'])}</div>
      ${mediaHtml}
    </div>
    <div class="mc-bars-bot"></div>
    <div class="wf-footer"><a href="index.html">Buat ucapanmu di Wishcraft</a></div>`;

  if (photos?.length>1) initSlideshowMain(photos.length);
  initReactions('.mc-react');
  if (yt && ytMode==='audio') initYT(yt);
}

function slideshowMain(photos) {
  const slides = photos.map((p,i)=>`
    <div class="mc-slide${i===0?' active':''}">
      <img src="${esc(p)}" alt="" loading="lazy">
      <div class="mc-slide-label">${String(i+1).padStart(2,'0')} / ${String(photos.length).padStart(2,'0')}</div>
    </div>`).join('');
  const dots = photos.map((_,i)=>`<button class="mc-snav-dot${i===0?' on':''}" onclick="goSlideMain(${i})"></button>`).join('');
  return `<div class="mc-slideshow" id="mcSS">${slides}<div class="mc-slide-nav">${dots}</div></div>`;
}

let mcSlideCur=0;
function initSlideshowMain(n) {
  if(n>1) setInterval(()=>goSlideMain((mcSlideCur+1)%n),5000);
}
window.goSlideMain = function(i) {
  document.querySelectorAll('.mc-slide').forEach((s,j)=>s.classList.toggle('active',j===i));
  document.querySelectorAll('.mc-snav-dot').forEach((d,j)=>d.classList.toggle('on',j===i));
  mcSlideCur=i;
};

// ── REACTIONS ─────────────────────────────────────────────────────────────────
function reactionBtns(cls, emojis) {
  return emojis.map(e=>`<button class="${cls}" onclick="react(this,'${e}')"><span style="font-size:1.1rem">${e}</span><span>0</span></button>`).join('');
}
function initReactions(sel) {
  // already bound via onclick in HTML
}
window.react = function(btn, emoji) {
  const countEl = btn.querySelector('span:last-child');
  countEl.textContent = parseInt(countEl.textContent||0)+1;
  flyEmoji(emoji);
  btn.style.transform='scale(1.15)';
  setTimeout(()=>btn.style.transform='',200);
};
function flyEmoji(e) {
  const w = document.getElementById('flyWrap');
  const el = document.createElement('div');
  el.className = 'fly';
  el.textContent = e;
  el.style.left = (20+Math.random()*60)+'%';
  el.style.bottom = '15%';
  el.style.animationDuration = (0.9+Math.random()*0.6)+'s';
  w.appendChild(el);
  setTimeout(()=>el.remove(),1600);
}

// ── MEDIA / YOUTUBE ───────────────────────────────────────────────────────────
function getYtId(url) {
  if (!url) return null;
  const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\n?#]+)/);
  return m ? m[1] : null;
}
function getSpotify(url) {
  if (!url) return null;
  const m = url.match(/open\.spotify\.com\/(track|playlist|album)\/([a-zA-Z0-9]+)/);
  return m ? {type:m[1],id:m[2]} : null;
}

function buildMedia(yt, ytMode, color) {
  if (!yt) return '';
  const sp = getSpotify(yt);
  const ytId = getYtId(yt);

  if (sp) {
    return `<div class="media-section"><div class="media-label">🎵 Musik</div>
      <iframe class="sp-embed" src="https://open.spotify.com/embed/${sp.type}/${sp.id}?theme=0" allow="autoplay;clipboard-write;encrypted-media;fullscreen;picture-in-picture" loading="lazy"></iframe></div>`;
  }
  if (ytId && ytMode === 'video') {
    return `<div class="media-section"><div class="media-label">🎬 Video</div>
      <iframe class="yt-embed" src="https://www.youtube.com/embed/${ytId}?rel=0&modestbranding=1" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe></div>`;
  }
  if (ytId && ytMode === 'audio') {
    return `<div class="media-section"><div class="media-label">🎵 Musik</div>
      <div class="audio-player" style="color:${color}">
        <button class="ap-btn" id="apBtn" style="color:${color}" onclick="togglePlay()">▶</button>
        <div class="ap-info">
          <div class="ap-title" id="apTitle">Memuat...</div>
          <div class="ap-bar"><div class="ap-prog" id="apProg"></div></div>
        </div>
      </div></div>`;
  }
  return '';
}

// YT IFrame API for audio mode
let ytPlayer = null, ytPlaying = false, ytTimer = null;

function initYT(url) {
  const id = getYtId(url);
  if (!id) return;
  const tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);
  window._ytVid = id;
}

window.onYouTubeIframeAPIReady = function() {
  ytPlayer = new YT.Player('ytHidden', {
    height:'0', width:'0',
    videoId: window._ytVid,
    playerVars: { autoplay:0, controls:0, origin: location.origin },
    events: {
      onReady: function(e) {
        const title = e.target.getVideoData().title;
        const el = document.getElementById('apTitle');
        if (el) el.textContent = title || 'Musik';
      },
      onStateChange: function(e) {
        if (e.data === YT.PlayerState.PLAYING) {
          ytPlaying = true;
          const btn = document.getElementById('apBtn');
          if (btn) btn.textContent = '⏸';
          startProgTimer();
        } else if (e.data === YT.PlayerState.PAUSED || e.data === YT.PlayerState.ENDED) {
          ytPlaying = false;
          const btn = document.getElementById('apBtn');
          if (btn) btn.textContent = '▶';
          clearInterval(ytTimer);
        }
      }
    }
  });
};

function startProgTimer() {
  clearInterval(ytTimer);
  ytTimer = setInterval(()=>{
    if (!ytPlayer || !ytPlayer.getDuration) return;
    const dur = ytPlayer.getDuration();
    const cur = ytPlayer.getCurrentTime();
    const prog = document.getElementById('apProg');
    if (prog && dur > 0) prog.style.width = (cur/dur*100)+'%';
  }, 500);
}

window.togglePlay = function() {
  if (!ytPlayer || typeof ytPlayer.playVideo !== 'function') return;
  if (ytPlaying) {
    ytPlayer.pauseVideo();
  } else {
    ytPlayer.playVideo();
  }
};
</script>
