<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wishcraft — Untuk Kamu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --ink: #0D0C0A;
    --paper: #F7F3EC;
    --muted: #8A8070;
    --smoke: #1A1814;
  }

  /* Theme variables */
  body.noir {
    --bg1: #0D0C0A; --bg2: #1A1814; --bg3: #261f15;
    --accent: #C9A84C; --accent2: #E8C97A;
    --text: #F7F3EC; --text-dim: #8A8070;
    --particle: rgba(201,168,76,0.6);
  }
  body.celestial {
    --bg1: #050510; --bg2: #0d0d25; --bg3: #141435;
    --accent: #7BA7D4; --accent2: #A8C8E8;
    --text: #E8F0FA; --text-dim: #6080A0;
    --particle: rgba(123,167,212,0.7);
  }
  body.garden {
    --bg1: #050f07; --bg2: #0d1f10; --bg3: #152d18;
    --accent: #7DC47D; --accent2: #A8DCA8;
    --text: #E8F5E8; --text-dim: #60906A;
    --particle: rgba(125,196,125,0.7);
  }
  body.sakura {
    --bg1: #0f050a; --bg2: #1f0d14; --bg3: #2d1520;
    --accent: #D47BA7; --accent2: #E8A8C8;
    --text: #F5E8EE; --text-dim: #906070;
    --particle: rgba(212,123,167,0.7);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg1);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: none;
  }

  /* Grain */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
    opacity: 0.35;
  }

  /* Canvas for particles */
  #particleCanvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
  }

  /* Custom cursor */
  .cursor {
    position: fixed;
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    mix-blend-mode: screen;
  }
  .cursor-ring {
    position: fixed;
    width: 32px; height: 32px;
    border: 1px solid var(--accent);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transition: all 0.12s ease;
    opacity: 0.4;
  }

  /* Page wrapper */
  .page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 2;
    padding: 4rem 2rem;
  }

  /* Envelope reveal animation */
  .envelope-wrapper {
    width: 100%;
    max-width: 640px;
    position: relative;
  }

  /* Top label */
  .from-label {
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 1rem;
    opacity: 0;
    animation: fadeUp 0.8s 0.2s forwards;
    text-align: center;
  }

  /* Main card */
  .card {
    border: 1px solid rgba(var(--accent-rgb, 201,168,76), 0.2);
    border-color: color-mix(in srgb, var(--accent) 25%, transparent);
    background: linear-gradient(135deg, var(--bg2) 0%, var(--bg3) 100%);
    padding: 3.5rem;
    position: relative;
    opacity: 0;
    transform: translateY(40px) scale(0.97);
    animation: cardReveal 1s cubic-bezier(0.34, 1.2, 0.64, 1) 0.5s forwards;
  }

  @keyframes cardReveal {
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Corner ornaments */
  .corner {
    position: absolute;
    width: 24px; height: 24px;
    border-color: var(--accent);
    border-style: solid;
    opacity: 0.6;
  }
  .corner.tl { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
  .corner.tr { top: -1px; right: -1px; border-width: 1px 1px 0 0; }
  .corner.bl { bottom: -1px; left: -1px; border-width: 0 0 1px 1px; }
  .corner.br { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }

  /* Occasion badge */
  .occasion-badge {
    font-size: 0.55rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    opacity: 0;
    animation: fadeUp 0.6s 0.8s forwards;
  }

  .occasion-badge::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, color-mix(in srgb, var(--accent) 40%, transparent), transparent);
  }

  /* To name */
  .to-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(3rem, 10vw, 5.5rem);
    font-weight: 300;
    font-style: italic;
    line-height: 1;
    color: var(--text);
    margin-bottom: 2.5rem;
    opacity: 0;
    animation: fadeUp 0.8s cubic-bezier(0.34, 1.2, 0.64, 1) 0.9s forwards;
  }

  /* Photo */
  .photo-frame {
    float: right;
    margin: 0 0 1.5rem 2rem;
    width: 140px;
    height: 140px;
    border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
    overflow: hidden;
    opacity: 0;
    animation: fadeUp 0.8s 1s forwards;
    shape-outside: square();
  }

  .photo-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: saturate(0.8) contrast(1.05);
  }

  /* Message */
  .message-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.25rem;
    font-weight: 300;
    line-height: 1.9;
    color: var(--text);
    opacity: 0;
    animation: fadeUp 0.8s 1.1s forwards;
    margin-bottom: 2.5rem;
    clear: both;
  }

  /* Signature */
  .signature {
    display: flex;
    align-items: center;
    gap: 1rem;
    opacity: 0;
    animation: fadeUp 0.6s 1.3s forwards;
  }

  .sig-line {
    width: 40px;
    height: 1px;
    background: color-mix(in srgb, var(--accent) 50%, transparent);
  }

  .sig-text {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .sig-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-style: italic;
    color: var(--accent);
  }

  /* Music player */
  .music-section {
    margin-top: 2rem;
    padding-top: 2rem;
    border-top: 1px solid color-mix(in srgb, var(--accent) 15%, transparent);
    opacity: 0;
    animation: fadeUp 0.6s 1.5s forwards;
  }

  .music-label {
    font-size: 0.55rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 1rem;
  }

  .music-player {
    display: flex;
    align-items: center;
    gap: 1.5rem;
  }

  .play-btn {
    width: 44px; height: 44px;
    border: 1px solid color-mix(in srgb, var(--accent) 50%, transparent);
    background: transparent;
    color: var(--accent);
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: none;
    transition: all 0.3s ease;
    flex-shrink: 0;
  }

  .play-btn:hover {
    background: color-mix(in srgb, var(--accent) 15%, transparent);
  }

  .music-bar {
    flex: 1;
    height: 1px;
    background: color-mix(in srgb, var(--accent) 15%, transparent);
    position: relative;
    overflow: hidden;
  }

  .music-bar-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.1s linear;
  }

  .music-title {
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* Hidden YT iframe */
  #ytPlayer { display: none; }

  /* Spotify embed */
  .spotify-embed {
    margin-top: 1rem;
    border-radius: 0;
  }

  /* Footer */
  .card-footer {
    margin-top: 2rem;
    text-align: center;
    opacity: 0;
    animation: fadeUp 0.6s 1.8s forwards;
  }

  .card-footer a {
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    text-decoration: none;
    text-transform: uppercase;
    transition: color 0.3s;
  }

  .card-footer a:hover { color: var(--accent); }

  /* Error state */
  .error-page {
    text-align: center;
    padding: 4rem 2rem;
  }

  .error-page h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 4rem;
    font-weight: 300;
    color: var(--muted);
    margin-bottom: 1rem;
  }

  .error-page p {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-bottom: 2rem;
  }

  .error-page a {
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    text-decoration: none;
    border-bottom: 1px solid rgba(201,168,76,0.3);
    padding-bottom: 2px;
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    .card { padding: 2.5rem 2rem; }
    .photo-frame { width: 100px; height: 100px; margin: 0 0 1rem 1.5rem; }
    .message-text { font-size: 1.1rem; }
  }
</style>
</head>
<body class="noir" id="mainBody">

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>
<canvas id="particleCanvas"></canvas>

<div class="page" id="mainPage">
  <!-- Content injected by JS -->
</div>

<div id="ytPlayer"></div>

<script>
  // ─── Parse Data ───────────────────────────────────────────────────────────
  const params = new URLSearchParams(window.location.search);
  const raw = params.get('d');
  let data = null;

  try {
    if (raw) data = JSON.parse(decodeURIComponent(escape(atob(raw))));
  } catch(e) { data = null; }

  // ─── Apply Theme ──────────────────────────────────────────────────────────
  const body = document.getElementById('mainBody');
  if (data?.theme) body.className = data.theme;

  // ─── Occasion Labels ──────────────────────────────────────────────────────
  const occasions = {
    birthday: '🎂 Selamat Ulang Tahun',
    anniversary: '💍 Selamat Anniversari',
    graduation: '🎓 Selamat Wisuda',
    newborn: '👶 Selamat atas Kelahiran si Kecil',
    wedding: '💒 Selamat Menikah',
    newyear: '🎊 Selamat Tahun Baru',
    custom: '✨ Sebuah Pesan Untukmu'
  };

  // ─── Render Page ──────────────────────────────────────────────────────────
  const page = document.getElementById('mainPage');

  if (!data) {
    page.innerHTML = `
      <div class="error-page">
        <h1>404</h1>
        <p>Link ini tidak valid atau sudah kadaluarsa.</p>
        <a href="index.html">Buat ucapan baru →</a>
      </div>`;
  } else {
    const hasPhoto = data.photo && data.photo.trim() !== '';
    const hasMusic = data.music && data.music.trim() !== '';

    let musicHTML = '';
    if (hasMusic) {
      const spotifyMatch = data.music.match(/open\.spotify\.com\/(track|playlist|album)\/([a-zA-Z0-9]+)/);
      const ytId = getYouTubeId(data.music);

      if (spotifyMatch) {
        const type = spotifyMatch[1], id = spotifyMatch[2];
        musicHTML = `
          <div class="music-section">
            <div class="music-label">Musik untuk momen ini</div>
            <iframe class="spotify-embed" src="https://open.spotify.com/embed/${type}/${id}?utm_source=generator&theme=0"
              width="100%" height="80" frameborder="0"
              allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
              loading="lazy"></iframe>
          </div>`;
      } else if (ytId) {
        musicHTML = `
          <div class="music-section">
            <div class="music-label">Musik untuk momen ini</div>
            <div class="music-player">
              <button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>
              <div class="music-bar"><div class="music-bar-fill" id="musicBar"></div></div>
              <div class="music-title" id="musicTitle">Memuat...</div>
            </div>
          </div>`;
      }
    }

    page.innerHTML = `
      <div class="from-label">Pesan untukmu dari ${escHtml(data.from)}</div>
      <div class="envelope-wrapper">
        <div class="card">
          <div class="corner tl"></div>
          <div class="corner tr"></div>
          <div class="corner bl"></div>
          <div class="corner br"></div>

          <div class="occasion-badge">${occasions[data.occasion] || occasions.custom}</div>

          <div class="to-name">${escHtml(data.to)},</div>

          ${hasPhoto ? `<div class="photo-frame"><img src="${escHtml(data.photo)}" alt="Foto" onerror="this.parentElement.style.display='none'"></div>` : ''}

          <div class="message-text">${escHtml(data.msg).replace(/\n/g, '<br>')}</div>

          <div class="signature">
            <div class="sig-line"></div>
            <div>
              <div class="sig-text">Dengan penuh kasih,</div>
              <div class="sig-name">${escHtml(data.from)}</div>
            </div>
          </div>

          ${musicHTML}
        </div>

        <div class="card-footer">
          <a href="index.html">Buat ucapanmu sendiri di Wishcraft</a>
        </div>
      </div>`;

    // Load YouTube
    const ytId = data.music ? getYouTubeId(data.music) : null;
    if (ytId) {
      loadYouTubeAPI(ytId);
    }
  }

  // ─── Escape HTML ──────────────────────────────────────────────────────────
  function escHtml(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ─── YouTube ──────────────────────────────────────────────────────────────
  function getYouTubeId(url) {
    const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\n?#]+)/);
    return m ? m[1] : null;
  }

  let ytPlayer, isPlaying = false;

  function loadYouTubeAPI(videoId) {
    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);
    window._ytVideoId = videoId;
  }

  window.onYouTubeIframeAPIReady = function() {
    ytPlayer = new YT.Player('ytPlayer', {
      height: '0', width: '0',
      videoId: window._ytVideoId,
      playerVars: { autoplay: 0, controls: 0 },
      events: {
        onReady: (e) => {
          const title = e.target.getVideoData().title;
          if (document.getElementById('musicTitle')) {
            document.getElementById('musicTitle').textContent = title || 'Musik';
          }
        },
        onStateChange: (e) => {
          if (e.data === YT.PlayerState.ENDED) {
            isPlaying = false;
            if (document.getElementById('playBtn')) document.getElementById('playBtn').textContent = '▶';
          }
        }
      }
    });
  };

  function togglePlay() {
    if (!ytPlayer) return;
    if (isPlaying) {
      ytPlayer.pauseVideo();
      document.getElementById('playBtn').textContent = '▶';
      isPlaying = false;
    } else {
      ytPlayer.playVideo();
      document.getElementById('playBtn').textContent = '⏸';
      isPlaying = true;
    }
  }

  // ─── Particle System ──────────────────────────────────────────────────────
  const canvas = document.getElementById('particleCanvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  let W, H;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // Get accent color from CSS variable
  function getAccentColor() {
    const style = getComputedStyle(document.body);
    return style.getPropertyValue('--particle').trim() || 'rgba(201,168,76,0.6)';
  }

  function createParticle() {
    return {
      x: Math.random() * W,
      y: H + 10,
      size: Math.random() * 2 + 0.5,
      speedX: (Math.random() - 0.5) * 0.5,
      speedY: -(Math.random() * 0.8 + 0.3),
      opacity: Math.random() * 0.6 + 0.1,
      life: 1
    };
  }

  for (let i = 0; i < 30; i++) {
    const p = createParticle();
    p.y = Math.random() * H;
    particles.push(p);
  }

  function animateParticles() {
    ctx.clearRect(0, 0, W, H);
    if (Math.random() < 0.03) particles.push(createParticle());

    const color = getAccentColor();
    particles = particles.filter(p => p.life > 0);

    particles.forEach(p => {
      p.x += p.speedX;
      p.y += p.speedY;
      p.life = p.y / H;

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = color.replace(/[\d.]+\)$/, `${p.opacity * p.life})`);
      ctx.fill();
    });

    requestAnimationFrame(animateParticles);
  }
  animateParticles();

  // ─── Custom Cursor ────────────────────────────────────────────────────────
  const cursor = document.getElementById('cursor');
  const ring = document.getElementById('cursorRing');
  let mx = 0, my = 0, rx = 0, ry = 0;

  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    cursor.style.left = mx - 4 + 'px';
    cursor.style.top = my - 4 + 'px';
  });

  function animateRing() {
    rx += (mx - rx - 16) * 0.1;
    ry += (my - ry - 16) * 0.1;
    ring.style.left = rx + 'px';
    ring.style.top = ry + 'px';
    requestAnimationFrame(animateRing);
  }
  animateRing();
</script>
</body>
</html>
