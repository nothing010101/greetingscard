<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wishcraft — Untuk Kamu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Mono:wght@300;400&family=Nunito:wght@300;400;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Josefin+Sans:wght@100;300;400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { min-height: 100vh; overflow-x: hidden; }
body { cursor: none; }

#cur { position:fixed; width:12px; height:12px; border-radius:50%; pointer-events:none; z-index:9999; transform:translate(-50%,-50%); }
#cur-ring { position:fixed; width:36px; height:36px; border-radius:50%; pointer-events:none; z-index:9998; transform:translate(-50%,-50%); border:1.5px solid currentColor; opacity:0.35; }
#fx { position:fixed; inset:0; pointer-events:none; z-index:1; }

/* ═══════════════════════════════
   SAKURA — Chubby pink bubbly
═══════════════════════════════ */
body.sakura { background:#fff0f5; font-family:'Nunito',sans-serif; }
body.sakura #cur { background:#e8719a; }
body.sakura #cur-ring { color:#e8719a; }

.s-bg {
  position:fixed; inset:0; z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 15% 10%, #ffd6e7 0%, transparent 55%),
    radial-gradient(ellipse 70% 70% at 85% 90%, #ffc2d4 0%, transparent 55%),
    #fff0f5;
}
.s-bubbles { position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events:none; }
.s-bubbles span { position:absolute; border-radius:50%; opacity:0.13; animation:floatUp linear infinite; }
@keyframes floatUp { to { transform:translateY(-115vh) scale(0.7); opacity:0; } }

.s-page { position:relative; z-index:2; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:3rem 1.5rem 4rem; }

.s-from { font-size:0.7rem; letter-spacing:0.22em; color:#c45c82; text-transform:uppercase; margin-bottom:1.2rem; opacity:0; animation:popIn 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.2s forwards; }

.s-card {
  background:rgba(255,255,255,0.8);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border-radius:28px;
  border:2px solid rgba(232,113,154,0.2);
  box-shadow:0 8px 50px rgba(232,113,154,0.18), inset 0 1px 0 rgba(255,255,255,0.9);
  padding:3rem 3rem 2.5rem;
  max-width:560px; width:100%;
  position:relative;
  opacity:0; transform:translateY(30px) scale(0.94);
  animation:popIn 0.85s cubic-bezier(0.34,1.3,0.64,1) 0.4s forwards;
}

.s-card::before,.s-card::after { content:'🌸'; position:absolute; font-size:1.8rem; animation:wiggle 3s ease-in-out infinite; }
.s-card::before { top:-16px; left:18px; }
.s-card::after  { top:-16px; right:18px; animation-delay:1.5s; }
@keyframes wiggle { 0%,100%{transform:rotate(-8deg);}50%{transform:rotate(8deg);} }

.s-badge {
  display:inline-block;
  background:linear-gradient(135deg,#ffb3cc,#ff85a1);
  color:white; font-size:0.65rem; font-weight:700;
  letter-spacing:0.12em; text-transform:uppercase;
  padding:0.4rem 1.2rem; border-radius:100px;
  margin-bottom:1.4rem;
  box-shadow:0 4px 14px rgba(255,133,161,0.4);
}

.s-name {
  font-size:clamp(2.6rem,9vw,4.2rem); font-weight:800;
  background:linear-gradient(135deg,#e8719a,#c44d78);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  line-height:1.1; margin-bottom:1.6rem;
}

.s-photo { width:96px; height:96px; border-radius:50%; object-fit:cover; border:4px solid white; box-shadow:0 6px 20px rgba(232,113,154,0.3); float:right; margin:0 0 1rem 1.4rem; }

.s-msg { font-size:1.05rem; font-weight:400; color:#5a3045; line-height:1.85; clear:both; margin-bottom:2rem; }

.s-sig { display:flex; align-items:center; gap:0.75rem; padding-top:1.4rem; border-top:2px dashed rgba(232,113,154,0.2); }
.s-heart { font-size:1.2rem; animation:heartbeat 1.2s ease-in-out infinite; }
@keyframes heartbeat { 0%,100%{transform:scale(1);}50%{transform:scale(1.28);} }
.s-sig-label { font-size:0.72rem; color:#c45c82; }
.s-sig-name { font-size:1rem; font-weight:700; color:#d44d78; }

.s-music { margin-top:1.4rem; padding-top:1.4rem; border-top:2px dashed rgba(232,113,154,0.2); }
.s-music-label { font-size:0.6rem; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:#c45c82; margin-bottom:0.7rem; }
.s-play {
  display:flex; align-items:center; gap:0.9rem;
  background:linear-gradient(135deg,#ffb3cc,#ff85a1);
  border-radius:100px; padding:0.6rem 1.2rem;
  cursor:none; border:none; width:fit-content;
  box-shadow:0 4px 15px rgba(255,133,161,0.4);
  transition:transform 0.2s,box-shadow 0.2s;
}
.s-play:hover { transform:scale(1.04); box-shadow:0 6px 22px rgba(255,133,161,0.55); }
.s-play span { font-size:0.7rem; font-weight:700; color:white; letter-spacing:0.1em; }

.s-footer { margin-top:2rem; text-align:center; opacity:0; animation:fadeUp 0.5s 1.5s forwards; }
.s-footer a { font-size:0.6rem; color:#c45c82; text-decoration:none; letter-spacing:0.15em; opacity:0.55; }

/* ═══════════════════════════════
   CELESTIAL — Deep space
═══════════════════════════════ */
body.celestial { background:#06071a; font-family:'Cormorant Garamond',serif; }
body.celestial #cur { background:#a8c8ff; }
body.celestial #cur-ring { color:#7ba7d4; }

.c-bg {
  position:fixed; inset:0; z-index:0;
  background:
    radial-gradient(ellipse 120% 80% at 50% -5%, #1a1060 0%, transparent 55%),
    radial-gradient(ellipse 70% 60% at 5% 85%, #0d2040 0%, transparent 50%),
    radial-gradient(ellipse 60% 60% at 95% 60%, #1a0d35 0%, transparent 50%),
    #06071a;
}
.c-stars { position:fixed; inset:0; z-index:0; pointer-events:none; }
.c-star { position:absolute; background:white; border-radius:50%; animation:twinkle ease-in-out infinite; }
@keyframes twinkle { 0%,100%{opacity:0.15;transform:scale(1);}50%{opacity:0.9;transform:scale(1.4);} }

.c-page { position:relative; z-index:2; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:4rem 1.5rem; }

.c-eyebrow { font-family:'Josefin Sans',sans-serif; font-weight:100; font-size:0.58rem; letter-spacing:0.45em; text-transform:uppercase; color:rgba(168,200,255,0.4); margin-bottom:1.2rem; opacity:0; animation:fadeUp 0.7s 0.2s forwards; }

.c-card { max-width:600px; width:100%; opacity:0; animation:fadeUp 1.1s cubic-bezier(0.22,1,0.36,1) 0.4s forwards; }

.c-inner {
  border:1px solid rgba(123,167,212,0.2);
  background:linear-gradient(145deg, rgba(26,16,96,0.55) 0%, rgba(13,32,64,0.4) 50%, rgba(26,13,53,0.55) 100%);
  backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
  padding:3.5rem; position:relative; overflow:hidden;
}
.c-inner::before {
  content:''; position:absolute; top:-40%; right:-15%; width:380px; height:380px;
  background:radial-gradient(circle,rgba(100,60,180,0.14) 0%,transparent 70%); pointer-events:none;
}
.c-inner::after {
  content:''; position:absolute; bottom:-30%; left:-10%; width:280px; height:280px;
  background:radial-gradient(circle,rgba(60,100,200,0.1) 0%,transparent 70%); pointer-events:none;
}

.c-corner { position:absolute; font-size:0.9rem; color:rgba(168,200,255,0.35); }
.c-corner.tl{top:1rem;left:1rem;} .c-corner.tr{top:1rem;right:1rem;} .c-corner.bl{bottom:1rem;left:1rem;} .c-corner.br{bottom:1rem;right:1rem;}

.c-occ { font-family:'Josefin Sans',sans-serif; font-weight:100; font-size:0.58rem; letter-spacing:0.48em; text-transform:uppercase; color:rgba(168,200,255,0.55); margin-bottom:1.8rem; }

.c-name { font-size:clamp(3rem,9vw,5.5rem); font-weight:300; font-style:italic; color:#e8f0ff; line-height:1.05; margin-bottom:0.5rem; text-shadow:0 0 60px rgba(123,167,212,0.35); }

.c-divider { display:flex; align-items:center; gap:1rem; margin:1.5rem 0; }
.c-divider::before,.c-divider::after { content:''; flex:1; height:1px; background:linear-gradient(to right,transparent,rgba(123,167,212,0.25),transparent); }
.c-divider span { color:rgba(168,200,255,0.35); font-size:0.55rem; }

.c-photo { width:115px; height:115px; object-fit:cover; border:1px solid rgba(123,167,212,0.25); float:right; margin:0 0 1.5rem 2rem; filter:saturate(0.65) contrast(1.1); }

.c-msg { font-size:1.15rem; font-weight:300; color:rgba(232,240,255,0.82); line-height:2; clear:both; margin-bottom:2rem; }

.c-sig { display:flex; align-items:center; gap:1.2rem; padding-top:1.5rem; border-top:1px solid rgba(123,167,212,0.12); }
.c-sig-line { width:28px; height:1px; background:rgba(123,167,212,0.38); }
.c-sig-from { font-family:'Josefin Sans'; font-size:0.52rem; letter-spacing:0.3em; color:rgba(168,200,255,0.45); text-transform:uppercase; }
.c-sig-name { font-style:italic; font-size:1.1rem; color:#a8c8ff; }

.c-music { margin-top:2rem; padding-top:2rem; border-top:1px solid rgba(123,167,212,0.1); }
.c-music-label { font-family:'Josefin Sans'; font-size:0.52rem; letter-spacing:0.35em; text-transform:uppercase; color:rgba(168,200,255,0.38); margin-bottom:0.9rem; }
.c-play {
  display:flex; align-items:center; gap:1rem;
  background:transparent; border:1px solid rgba(123,167,212,0.28); color:#a8c8ff;
  padding:0.8rem 1.5rem; font-family:'Josefin Sans'; font-size:0.58rem; letter-spacing:0.25em; text-transform:uppercase;
  cursor:none; transition:all 0.3s; width:fit-content;
}
.c-play:hover { background:rgba(123,167,212,0.1); border-color:rgba(123,167,212,0.55); }

.c-footer { text-align:center; margin-top:2rem; opacity:0; animation:fadeUp 0.5s 1.8s forwards; }
.c-footer a { font-family:'Josefin Sans'; font-size:0.48rem; letter-spacing:0.3em; color:rgba(168,200,255,0.28); text-decoration:none; }

/* ═══════════════════════════════
   GARDEN — Lush organic
═══════════════════════════════ */
body.garden { background:#f2f7f0; font-family:'Playfair Display',serif; }
body.garden #cur { background:#4a8c5c; }
body.garden #cur-ring { color:#4a8c5c; }

.g-bg {
  position:fixed; inset:0; z-index:0;
  background:
    radial-gradient(ellipse 90% 60% at 0% 0%, #d4eed8 0%, transparent 50%),
    radial-gradient(ellipse 80% 80% at 100% 100%, #c8e8c8 0%, transparent 50%),
    #f2f7f0;
}

.g-page { position:relative; z-index:2; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:4rem 1.5rem; }

.g-card {
  max-width:580px; width:100%;
  background:rgba(255,255,255,0.82);
  border:1px solid rgba(74,140,92,0.14);
  box-shadow:0 20px 80px rgba(74,140,92,0.1), 0 2px 8px rgba(74,140,92,0.06);
  overflow:hidden;
  opacity:0; animation:fadeUp 1s cubic-bezier(0.22,1,0.36,1) 0.4s forwards;
}

.g-head {
  background:linear-gradient(135deg,#2d5e3a 0%,#3d7a4c 55%,#2d5e3a 100%);
  padding:2.2rem 3rem; position:relative; overflow:hidden;
}
.g-head::after { content:''; position:absolute; inset:0; background:url("data:image/svg+xml,%3Csvg width='40' height='40' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='20' cy='20' r='1' fill='rgba(255,255,255,0.06)'/%3E%3C/svg%3E"); }
.g-leaf { position:absolute; pointer-events:none; opacity:0.09; font-size:7rem; }
.g-leaf.r { right:-15px; top:-15px; transform:rotate(30deg); font-size:9rem; }
.g-leaf.l { left:-10px; bottom:-20px; transform:rotate(-20deg); }

.g-occ { font-family:'Josefin Sans'; font-size:0.52rem; letter-spacing:0.4em; text-transform:uppercase; color:rgba(200,232,200,0.65); margin-bottom:0.6rem; position:relative; z-index:1; }
.g-name { font-size:clamp(2.4rem,8vw,3.8rem); font-weight:700; font-style:italic; color:white; line-height:1.1; position:relative; z-index:1; text-shadow:0 2px 20px rgba(0,0,0,0.18); }

.g-body { padding:2.5rem 3rem; }
.g-photo { width:95px; height:95px; border-radius:4px; object-fit:cover; float:right; margin:0 0 1rem 1.4rem; border:3px solid white; box-shadow:0 4px 20px rgba(74,140,92,0.18); }
.g-msg { font-size:1.08rem; font-weight:400; color:#2a3d2a; line-height:1.9; clear:both; margin-bottom:2rem; }

.g-sig { border-top:1px solid rgba(74,140,92,0.14); padding-top:1.4rem; display:flex; align-items:center; gap:0.9rem; }
.g-sig-icon { font-size:1.1rem; }
.g-sig-from { font-family:'Josefin Sans'; font-size:0.52rem; letter-spacing:0.22em; color:#7aaa7a; text-transform:uppercase; }
.g-sig-name { font-style:italic; font-size:1.05rem; color:#3d7a4c; }

.g-music { padding:1.4rem 3rem 2.4rem; border-top:1px solid rgba(74,140,92,0.1); }
.g-music-label { font-family:'Josefin Sans'; font-size:0.52rem; letter-spacing:0.28em; text-transform:uppercase; color:#7aaa7a; margin-bottom:0.7rem; }
.g-play {
  display:flex; align-items:center; gap:0.7rem;
  background:#2d5e3a; color:white; border:none;
  padding:0.75rem 1.4rem; font-family:'Josefin Sans'; font-size:0.58rem; letter-spacing:0.18em; text-transform:uppercase;
  cursor:none; transition:all 0.3s; width:fit-content;
  box-shadow:0 4px 16px rgba(45,94,58,0.28);
}
.g-play:hover { background:#3d7a4c; transform:translateY(-2px); }
.g-footer { text-align:center; padding:0.5rem 3rem 1.8rem; }
.g-footer a { font-family:'Josefin Sans'; font-size:0.48rem; letter-spacing:0.28em; color:#7aaa7a; text-decoration:none; opacity:0.6; }

/* ═══════════════════════════════
   NOIR — Gold luxury editorial
═══════════════════════════════ */
body.noir { background:#0d0c0a; font-family:'DM Mono',monospace; }
body.noir #cur { background:#c9a84c; }
body.noir #cur-ring { color:#c9a84c; }

.n-bg {
  position:fixed; inset:0; z-index:0;
  background:
    radial-gradient(ellipse 50% 50% at 50% 0%, rgba(201,168,76,0.04) 0%, transparent 55%),
    radial-gradient(ellipse 35% 35% at 95% 100%, rgba(201,168,76,0.03) 0%, transparent 50%),
    #0d0c0a;
}
.n-grain { position:fixed; inset:0; z-index:0; pointer-events:none; opacity:0.38; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E"); }

.n-page { position:relative; z-index:2; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:5rem 1.5rem; }

.n-eyebrow { font-size:0.52rem; letter-spacing:0.45em; text-transform:uppercase; color:rgba(201,168,76,0.35); margin-bottom:1.4rem; opacity:0; animation:fadeUp 0.7s 0.2s forwards; }

.n-card {
  max-width:640px; width:100%;
  border:1px solid rgba(201,168,76,0.14);
  background:linear-gradient(155deg,#141210 0%,#1a1612 50%,#0f0e0c 100%);
  padding:4rem;
  position:relative;
  opacity:0; transform:translateY(28px);
  animation:fadeUp 1s cubic-bezier(0.22,1,0.36,1) 0.5s forwards;
  box-shadow:0 40px 120px rgba(0,0,0,0.55), 0 0 0 1px rgba(201,168,76,0.04);
}

.n-corner { position:absolute; width:26px; height:26px; border-color:rgba(201,168,76,0.45); border-style:solid; }
.n-corner.tl{top:-1px;left:-1px;border-width:1px 0 0 1px;} .n-corner.tr{top:-1px;right:-1px;border-width:1px 1px 0 0;}
.n-corner.bl{bottom:-1px;left:-1px;border-width:0 0 1px 1px;} .n-corner.br{bottom:-1px;right:-1px;border-width:0 1px 1px 0;}

.n-occ { font-size:0.52rem; letter-spacing:0.4em; text-transform:uppercase; color:rgba(201,168,76,0.55); margin-bottom:2.2rem; display:flex; align-items:center; gap:1rem; }
.n-occ::after { content:''; flex:1; height:1px; background:linear-gradient(to right,rgba(201,168,76,0.28),transparent); }

.n-name { font-family:'Cormorant Garamond',serif; font-size:clamp(3.5rem,10vw,6rem); font-weight:300; font-style:italic; color:#f7f3ec; line-height:1; margin-bottom:2.2rem; }

.n-rule { display:flex; align-items:center; gap:1.5rem; margin-bottom:1.8rem; }
.n-rule::before,.n-rule::after { content:''; flex:1; height:1px; background:rgba(201,168,76,0.12); }
.n-rule span { color:rgba(201,168,76,0.38); font-size:0.48rem; }

.n-photo { width:125px; height:125px; object-fit:cover; float:right; margin:0 0 1.5rem 2.5rem; border:1px solid rgba(201,168,76,0.18); filter:saturate(0.55) contrast(1.15) brightness(0.9); box-shadow:8px 8px 0 rgba(201,168,76,0.07); }

.n-msg { font-family:'Cormorant Garamond',serif; font-size:1.18rem; font-weight:300; color:rgba(247,243,236,0.78); line-height:2; clear:both; margin-bottom:2.2rem; }

.n-sig { display:flex; align-items:center; gap:1.5rem; padding-top:1.8rem; border-top:1px solid rgba(201,168,76,0.1); }
.n-sig-dash { width:38px; height:1px; background:rgba(201,168,76,0.38); }
.n-sig-label { font-size:0.52rem; letter-spacing:0.22em; color:rgba(201,168,76,0.38); text-transform:uppercase; }
.n-sig-name { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:1.18rem; color:#c9a84c; }

.n-music { margin-top:2rem; padding-top:2rem; border-top:1px solid rgba(201,168,76,0.07); }
.n-music-label { font-size:0.48rem; letter-spacing:0.35em; text-transform:uppercase; color:rgba(201,168,76,0.32); margin-bottom:0.9rem; }
.n-play {
  display:flex; align-items:center; gap:1rem;
  background:transparent; border:1px solid rgba(201,168,76,0.28); color:#c9a84c;
  padding:0.9rem 1.8rem; font-family:'DM Mono'; font-size:0.58rem; letter-spacing:0.25em; text-transform:uppercase;
  cursor:none; transition:all 0.35s; width:fit-content; position:relative; overflow:hidden;
}
.n-play::before { content:''; position:absolute; inset:0; background:rgba(201,168,76,0.07); transform:translateX(-100%); transition:transform 0.35s; }
.n-play:hover::before { transform:translateX(0); }

.n-footer { text-align:center; margin-top:2.5rem; opacity:0; animation:fadeUp 0.5s 2s forwards; }
.n-footer a { font-size:0.48rem; letter-spacing:0.3em; color:rgba(201,168,76,0.18); text-decoration:none; text-transform:uppercase; }

/* ═══════════════════════════════
   SHARED
═══════════════════════════════ */
@keyframes fadeUp { from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);} }
@keyframes popIn { from{opacity:0;transform:translateY(28px) scale(0.91);}to{opacity:1;transform:translateY(0) scale(1);} }
.hidden-yt { display:none; }
.spotify-wrap { margin-top:0.7rem; }
.err-wrap { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:2rem; }
.err-wrap h1 { font-family:'Cormorant Garamond',serif; font-size:5rem; font-weight:300; color:#444; }
.err-wrap p { font-size:0.75rem; color:#666; margin:1rem 0 2rem; letter-spacing:0.1em; }
.err-wrap a { font-size:0.65rem; color:#c9a84c; letter-spacing:0.2em; text-decoration:none; }

@media(max-width:600px){
  .s-card,.n-card{padding:2.4rem 1.8rem;}
  .c-inner{padding:2.4rem 1.8rem;}
  .g-body{padding:2rem 1.8rem;}
  .g-head{padding:2rem 1.8rem;}
  .g-music{padding:1.2rem 1.8rem 2rem;}
  .s-photo,.n-photo,.g-photo,.c-photo{width:75px;height:75px;margin:0 0 0.8rem 1rem;}
}
</style>
</head>
<body id="body">
<div id="cur"></div>
<div id="cur-ring"></div>
<canvas id="fx"></canvas>
<div id="app"></div>
<div id="hidden-yt" class="hidden-yt"></div>

<script>
// ── Parse ────────────────────────────────────────────────────────────────────
let data = null;
try { const r=new URLSearchParams(location.search).get('d'); if(r) data=JSON.parse(decodeURIComponent(escape(atob(r)))); } catch(e){}
const theme = data?.theme||'noir';
document.getElementById('body').className = theme;

const OCC = {birthday:'🎂 Selamat Ulang Tahun',anniversary:'💍 Selamat Anniversari',graduation:'🎓 Selamat Wisuda',newborn:'👶 Kelahiran si Kecil',wedding:'💒 Selamat Menikah',newyear:'🎊 Selamat Tahun Baru',custom:'✨ Untukmu'};
const esc = s => s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : '';
const nl  = s => esc(s).replace(/\n/g,'<br>');
const ytId = u => { const m=u?.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\n?#]+)/); return m?m[1]:null; };
const spId = u => { const m=u?.match(/open\.spotify\.com\/(track|playlist|album)\/([a-zA-Z0-9]+)/); return m?{type:m[1],id:m[2]}:null; };

function photoEl(cls) { return data?.photo ? `<img class="${cls}" src="${esc(data.photo)}" alt="" onerror="this.style.display='none'">` : ''; }

function musicBlock(wrapCls, labelCls, playBtnCls, labelTxt, url) {
  if (!url) return '';
  const sp = spId(url), yt = ytId(url);
  const inner = sp
    ? `<div class="spotify-wrap"><iframe src="https://open.spotify.com/embed/${sp.type}/${sp.id}?theme=0" width="100%" height="80" frameborder="0" allow="autoplay;clipboard-write;encrypted-media;fullscreen;picture-in-picture" loading="lazy"></iframe></div>`
    : yt ? `<button class="${playBtnCls}" id="playBtn" onclick="togglePlay()"><span id="playIcon">▶</span><span id="playTitle">Putar musik</span></button>` : '';
  if (!inner) return '';
  return `<div class="${wrapCls}"><div class="${labelCls}">${labelTxt}</div>${inner}</div>`;
}

// ── Canvas Effects ────────────────────────────────────────────────────────────
const canvas = document.getElementById('fx');
const ctx = canvas.getContext('2d');
let W,H;
function resize(){ W=canvas.width=innerWidth; H=canvas.height=innerHeight; }
resize(); window.addEventListener('resize',resize);

function startHearts(){
  const pts=[], shapes=['♥','♡','❤','💕','🩷'];
  for(let i=0;i<28;i++) pts.push(mkHeart());
  function mkHeart(){ return{x:Math.random()*innerWidth,y:innerHeight+20,sz:10+Math.random()*22,vy:0.4+Math.random()*0.8,vx:(Math.random()-0.5)*0.55,rot:Math.random()*Math.PI*2,rs:(Math.random()-0.5)*0.022,op:0.2+Math.random()*0.5,s:shapes[~~(Math.random()*shapes.length)],c:`hsl(${330+Math.random()*30},80%,${65+Math.random()*18}%)`}; }
  (function draw(){
    ctx.clearRect(0,0,W,H);
    if(Math.random()<0.04) pts.push(mkHeart());
    for(let i=pts.length-1;i>=0;i--){
      const h=pts[i]; h.y-=h.vy; h.x+=h.vx; h.rot+=h.rs;
      if(h.y<-25){pts.splice(i,1);continue;}
      ctx.save(); ctx.translate(h.x,h.y); ctx.rotate(h.rot);
      ctx.globalAlpha=h.op*Math.min(1,h.y/H*4);
      ctx.font=`${h.sz}px serif`; ctx.fillStyle=h.c; ctx.textAlign='center'; ctx.fillText(h.s,0,0);
      ctx.restore();
    }
    requestAnimationFrame(draw);
  })();
}

function startStarDust(){
  const pts=[];
  for(let i=0;i<45;i++) pts.push(mkStar());
  function mkStar(){ return{x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*1.4+0.3,vx:(Math.random()-0.5)*0.28,vy:(Math.random()-0.5)*0.28,life:Math.random(),dl:(Math.random()*0.004+0.002)*(Math.random()>0.5?1:-1)}; }
  (function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.life+=p.dl;
      if(p.life<=0||p.life>=1) p.dl*=-1;
      if(p.x<0||p.x>W) p.vx*=-1;
      if(p.y<0||p.y>H) p.vy*=-1;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(168,200,255,${p.life*0.65})`; ctx.fill();
    });
    requestAnimationFrame(draw);
  })();
}

function startLeaves(){
  const pts=[],em=['🍃','🌿','🍀','🌱','🍂'];
  for(let i=0;i<16;i++) pts.push(mkLeaf());
  function mkLeaf(){ return{x:Math.random()*innerWidth,y:-20,sz:13+Math.random()*13,vy:0.55+Math.random()*0.9,vx:(Math.random()-0.5)*0.8,rot:Math.random()*Math.PI*2,rs:(Math.random()-0.5)*0.025,op:0.3+Math.random()*0.4,e:em[~~(Math.random()*em.length)]}; }
  (function draw(){
    ctx.clearRect(0,0,W,H);
    if(Math.random()<0.018) pts.push(mkLeaf());
    for(let i=pts.length-1;i>=0;i--){
      const l=pts[i]; l.y+=l.vy; l.x+=Math.sin(l.y*0.012)*l.vx; l.rot+=l.rs;
      if(l.y>H+25){pts.splice(i,1);continue;}
      ctx.save(); ctx.translate(l.x,l.y); ctx.rotate(l.rot);
      ctx.globalAlpha=l.op; ctx.font=`${l.sz}px serif`; ctx.textAlign='center'; ctx.fillText(l.e,0,0);
      ctx.restore();
    }
    requestAnimationFrame(draw);
  })();
}

function startGoldDust(){
  const pts=[];
  for(let i=0;i<40;i++) pts.push(mkDust());
  function mkDust(){ return{x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*1.1+0.2,vx:(Math.random()-0.5)*0.18,vy:-Math.random()*0.38-0.08,op:Math.random()*0.35+0.05}; }
  (function draw(){
    ctx.clearRect(0,0,W,H);
    for(let i=pts.length-1;i>=0;i--){
      const p=pts[i]; p.x+=p.vx; p.y+=p.vy;
      if(p.y<-5){pts.splice(i,1); const nd=mkDust(); nd.y=H+5; pts.push(nd); continue;}
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(201,168,76,${p.op})`; ctx.fill();
    }
    requestAnimationFrame(draw);
  })();
}

// ── Cursor ────────────────────────────────────────────────────────────────────
const cur=document.getElementById('cur'), ring=document.getElementById('cur-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{ mx=e.clientX; my=e.clientY; cur.style.left=mx+'px'; cur.style.top=my+'px'; });
(function ar(){ rx+=(mx-rx)*0.1; ry+=(my-ry)*0.1; ring.style.left=rx+'px'; ring.style.top=ry+'px'; requestAnimationFrame(ar); })();

// ── YouTube ───────────────────────────────────────────────────────────────────
let ytPlayer,isPlay=false;
const vid = data?.music ? ytId(data.music) : null;
if(vid){
  const t=document.createElement('script'); t.src='https://www.youtube.com/iframe_api'; document.head.appendChild(t);
  window.onYouTubeIframeAPIReady=()=>{
    ytPlayer=new YT.Player('hidden-yt',{height:'0',width:'0',videoId:vid,playerVars:{autoplay:0,controls:0},events:{
      onReady:e=>{ const ti=e.target.getVideoData().title; const el=document.getElementById('playTitle'); if(el&&ti) el.textContent=ti; },
      onStateChange:e=>{ if(e.data===YT.PlayerState.ENDED){isPlay=false;const ic=document.getElementById('playIcon');if(ic)ic.textContent='▶';} }
    }});
  };
}
window.togglePlay=function(){
  if(!ytPlayer)return;
  const ic=document.getElementById('playIcon');
  if(isPlay){ytPlayer.pauseVideo();if(ic)ic.textContent='▶';}
  else{ytPlayer.playVideo();if(ic)ic.textContent='⏸';}
  isPlay=!isPlay;
};
</script>
